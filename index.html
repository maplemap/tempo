<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo — personal time tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      line-height: 1.5;
      background: #fff;
      color: #000;
      padding: 48px 24px 80px;
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
    .tagline { color: #888; margin-top: 6px; }
    .stack { margin-top: 20px; color: #888; font-size: 13px; }
    .screenshots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 40px;
    }
    figure { border: 1px solid #000; }
    figure img { width: 100%; display: block; cursor: zoom-in; }
    figcaption {
      padding: 8px 12px;
      border-top: 1px solid #000;
      font-size: 12px;
      color: #888;
    }
    .quickstart { margin-top: 48px; }
    .quickstart h2 { font-size: 13px; font-weight: 500; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    pre {
      border: 1px solid #000;
      padding: 16px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      overflow-x: auto;
    }
    .link { margin-top: 32px; }
    .link a { color: #000; text-decoration: underline; text-underline-offset: 3px; }
    @media (max-width: 640px) {
      .screenshots { grid-template-columns: 1fr; }
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      display: block;
      border: 1px solid #333;
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-family: inherit;
      font-size: 13px;
      color: #fff;
      background: none;
      border: 1px solid #555;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .lightbox-close:hover { border-color: #fff; }
  </style>
</head>
<body>
  <h1>tempo</h1>
  <p class="tagline">personal time tracker with github verification overlay</p>
  <p class="stack">Node.js · Fastify · React · SQLite · Docker</p>

  <div class="screenshots">
    <figure>
      <img src="screenshots/01-timer.png" alt="timer — track time with a running clock" onclick="openLightbox(this.src)" title="click to enlarge">
      <figcaption>timer — track time with a running clock</figcaption>
    </figure>
    <figure>
      <img src="screenshots/03-dashboard.png" alt="dashboard — weekly stats with ascii bars" onclick="openLightbox(this.src)" title="click to enlarge">
      <figcaption>dashboard — weekly stats with ascii bars</figcaption>
    </figure>
    <figure>
      <img src="screenshots/02-entries.png" alt="entries — full log with project breakdown" onclick="openLightbox(this.src)" title="click to enlarge">
      <figcaption>entries — full log with project breakdown</figcaption>
    </figure>
    <figure>
      <img src="screenshots/04-settings.png" alt="settings — projects and github sync config" onclick="openLightbox(this.src)" title="click to enlarge">
      <figcaption>settings — projects and github sync config</figcaption>
    </figure>
  </div>

  <div class="quickstart">
    <h2>Quick start</h2>
    <pre>cp .env.example .env
# set ADMIN_PASSWORD and JWT_SECRET
make prod</pre>
  </div>

  <p class="link"><a href="https://github.com/maplemap/tempo">→ github.com/maplemap/tempo</a></p>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">[ × close ]</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.addEventListener('keydown', onKey);
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e) { if (e.key === 'Escape') closeLightbox(); }
  </script>
</body>
</html>
